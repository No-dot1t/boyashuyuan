# 邮件配置文件
# 将此文件复制到 src/main/resources 目录并填入实际配置

# SMTP服务器地址（QQ邮箱/网易邮箱/Gmail等）
mail.smtp.host=smtp.qq.com

# SMTP端口（QQ邮箱使用587，网易邮箱使用465，Gmail使用587）
mail.smtp.port=587

# 发件邮箱账号
mail.username=your_email@qq.com

# 发件邮箱密码/授权码
# QQ邮箱：设置 -> 账户 -> 开启SMTP服务 -> 生成授权码
# 网易邮箱：设置 -> POP3/SMTP/IMAP -> 开启服务 -> 生成授权码
mail.password=your_auth_code

# 是否需要认证
mail.smtp.auth=true

# 调试模式（生产环境设为false）
mail.debug=false
