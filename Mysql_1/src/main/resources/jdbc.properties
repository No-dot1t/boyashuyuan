# ╔══════════════════════════════════════════════════════════════╗
# ║  ⚠️ 安全提醒：生产环境请务必修改以下配置                    ║
# ║  1. 将 root 账户替换为专用数据库账户（最小权限原则）        ║
# ║  2. 将密码改为强密码，并通过环境变量或加密配置注入          ║
# ║  3. 建议使用 jdbc.password=${DB_PASSWORD} 环境变量方式     ║
# ╚══════════════════════════════════════════════════════════════╝
jdbc.driver=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://localhost:3306/javaweb?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
jdbc.username=root
jdbc.password=123456

pool.maxSize=10
pool.minIdle=2
pool.idleTimeout=300000
pool.connectionTimeout=10000
pool.maxLifetime=1200000